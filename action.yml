name: "ClawVet Security Scanner"
description: "Scan AI agent skills and MCP servers for prompt injection, credential theft, RCE, and supply chain threats"
branding:
  icon: "shield"
  color: "red"

inputs:
  mode:
    description: "Scan mode: scan (one skill), doctor (all agents), mcp (MCP servers)"
    required: false
    default: "scan"
  path:
    description: "Path to skill folder or SKILL.md file (used with mode: scan)"
    required: false
    default: ""
  fail-on:
    description: "Minimum severity to fail on (critical, high, medium, low)"
    required: false
    default: "high"
  format:
    description: "Output format (terminal, json, sarif)"
    required: false
    default: "sarif"
  agent-dirs:
    description: "Additional agent skill dirs to scan (comma-separated, used with mode: doctor)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run ClawVet scan (single skill)
      if: inputs.mode == 'scan'
      shell: bash
      run: |
        npx clawvet@latest scan "${{ inputs.path }}" \
          --fail-on ${{ inputs.fail-on }} \
          --format ${{ inputs.format }}

    - name: Run ClawVet doctor (all agents)
      if: inputs.mode == 'doctor'
      shell: bash
      run: |
        npx clawvet@latest doctor \
          --format ${{ inputs.format }} \
          --fail-on ${{ inputs.fail-on }}

    - name: Run ClawVet MCP scan
      if: inputs.mode == 'mcp'
      shell: bash
      run: |
        npx clawvet@latest mcp --format ${{ inputs.format }}
